services:
  - type: web
    name: sms-project
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn sms_project.wsgi:application"
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        value: django-insecure-sms-secret-key-change-in-production-2024
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString

databases:
  - name: sms-db
    databaseName: sms_db
    user: sms_user